<!DOCTYPE html>
<html lang="id">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Commissioner:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - Photoholic</title>
  <link rel="stylesheet" href="register.css" />
</head>
<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="brand">
      <img class="brand__logo" src="assets/logo-photoholic.png" alt="Photoholic" />
    </div>
    <a class="help" href="#">Need Help?</a>
  </header>

  <!-- CONTENT -->
  <main class="content">

    <!-- LEFT -->
    <section class="left">
      <div class="logoGroup">
        <img class="left__illus" src="assets/logo-icon.png" alt="Illustration" />
        <img class="left__bigLogo" src="assets/test-photoholic.png" alt="photoholic" />
      </div>
    </section>

    <!-- RIGHT -->
    <section class="right">
      <div class="card">
        <h2 class="card__title">Login to your account</h2>

        <form class="form" action="#" method="post">

          <div class="field">
            <label for="name">Name</label>
            <input id="name" type="text" placeholder="Input your name" />
          </div>

          <div class="field">
            <label for="email">Email Address</label>
            <input id="email" type="email" placeholder="Input your email address" />
          </div>

          <div class="field">
            <label for="mobile">Mobile Number</label>
            <input id="mobile" type="tel" placeholder="Input your mobile number" />
          </div>

          <!-- PASSWORD -->
          <div class="field">
            <label for="pass">Password</label>
            <div class="inputIcon">
              <input id="pass" type="password" placeholder="Input your password" />
              <button class="eyeBtn" type="button" aria-label="toggle password" data-target="pass" data-state="hidden">

                <!-- eye open -->
                <svg class="icon-eye icon-eye-open" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                  <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"
                        fill="none" stroke="currentColor" stroke-width="2"/>
                </svg>

                <!-- eye off -->
                <svg class="icon-eye icon-eye-off" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M3 3l18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <path d="M10.6 10.6a2.5 2.5 0 0 0 3.4 3.4"
                        fill="none" stroke="currentColor" stroke-width="2"/>
                  <path d="M6.5 6.5C4 8.5 2 12 2 12s3.5 7 10 7c2 0 3.8-.5 5.3-1.4"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                  <path d="M9.5 4.3A10.8 10.8 0 0 1 12 5c6.5 0 10 7 10 7a18 18 0 0 1-3.2 4.5"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                </svg>

              </button>
            </div>
          </div>

          <!-- CONFIRM PASSWORD -->
          <div class="field">
            <label for="confirm">Confirmation Password</label>
            <div class="inputIcon">
              <input id="confirm" type="password" placeholder="Confirm your password" />
              <button class="eyeBtn" type="button" aria-label="toggle password" data-target="confirm" data-state="hidden">

                <!-- eye open -->
                <svg class="icon-eye icon-eye-open" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                  <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"
                        fill="none" stroke="currentColor" stroke-width="2"/>
                </svg>

                <!-- eye off -->
                <svg class="icon-eye icon-eye-off" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M3 3l18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <path d="M10.6 10.6a2.5 2.5 0 0 0 3.4 3.4"
                        fill="none" stroke="currentColor" stroke-width="2"/>
                  <path d="M6.5 6.5C4 8.5 2 12 2 12s3.5 7 10 7c2 0 3.8-.5 5.3-1.4"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                  <path d="M9.5 4.3A10.8 10.8 0 0 1 12 5c6.5 0 10 7 10 7a18 18 0 0 1-3.2 4.5"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                </svg>

              </button>
            </div>
          </div>

          <label class="terms">
            <input type="checkbox" />
            <span>I agree with the <a href="#">terms and conditions</a></span>
          </label>

          <button class="btn" type="submit">Registrasi</button>

          <div class="divider"><span>or continue with</span></div>

          <button class="google" type="button" aria-label="Continue with Google">
            <img src="assets/icon-google.png" alt="Google" />
          </button>

        </form>
      </div>
    </section>

  </main>

  <script>
    document.querySelectorAll(".eyeBtn").forEach(btn => {
      btn.addEventListener("click", () => {
        const input = document.getElementById(btn.dataset.target);
        const isHidden = input.type === "password";
        input.type = isHidden ? "text" : "password";
        btn.dataset.state = isHidden ? "shown" : "hidden";
      });
    });
  </script>

</body>
</html>
