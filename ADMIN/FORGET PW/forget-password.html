<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Commissioner:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  />

  <title>Forgot Password - Photoholic</title>
  <link rel="stylesheet" href="forget-password.css" />
</head>
<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="brand">
      <img class="brand__logo" src="assets/logo-photoholic.png" alt="Photoholic" />
    </div>
    <a class="help" href="#">Need Help?</a>
  </header>

  <!-- CONTENT -->
  <main class="content">

    <!-- LEFT -->
    <section class="left">
      <div class="logoGroup">
        <img class="left__illus" src="assets/logo-icon.png" alt="Illustration" />
        <img class="left__bigLogo" src="assets/test-photoholic.png" alt="Photoholic" />
      </div>
    </section>

    <!-- RIGHT -->
    <section class="right">
      <div class="card">
        <h2 class="card__title">Forgot Password?</h2>

        <p class="desc">
          Don’t worry! It happens. Please enter your email address to verification.
        </p>

        <form class="form" action="#" method="post">
          <div class="field">
            <label for="user">Email/Phone Number</label>
            <input
              id="user"
              type="text"
              placeholder="Input your email/phone number"
              required
            />
          </div>

          <button class="btn" type="submit">Submit</button>
        </form>
      </div>
    </section>

  </main>

</body>
</html>
