<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Commissioner:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <title>Profil - Photoholic</title>
  <link rel="stylesheet" href="profile.css" />
  <link rel="stylesheet" href="layout.css">
</head>
<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <img class="brand__logo" src="assets/logo-photoholic.png" alt="Photoholic">

    <nav class="topnav" aria-label="Main navigation">
      <a class="topnav__link" href="beranda.html">Beranda</a>
      <a class="topnav__link" href="studio.html">Studio</a>
      <a class="topnav__link" href="blog.html">Blog</a>
      <a class="topnav__link" href="booking.html">Pemesanan</a>
    </nav>

    <button class="topbar__user is-active" type="button" aria-label="User menu">
      <span class="topbar__userCircle">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 12a4.5 4.5 0 1 0-4.5-4.5A4.5 4.5 0 0 0 12 12Z" fill="none" stroke="currentColor" stroke-width="2"/>
          <path d="M4 21c1.8-4 14.2-4 16 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </span>
    </button>
  </header>

  <!-- PAGE -->
  <main class="page">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="userCard">
        <div class="userCard__avatar">
          <img src="assets/image1.png" alt="avatar">
        </div>
        <div class="userCard__info">
          <div class="userCard__name">Berlian Ika</div>
          <a class="userCard__edit" href="#">
            <span class="icon-inline" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M12 20h9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M16.5 3.5l4 4L8 20H4v-4L16.5 3.5Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
              </svg>
            </span>
            Ubah Profil
          </a>
        </div>
      </div>

      <div class="menu">
        <div class="menu__groupTitle">
          <span class="icon-inline" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Z" fill="none" stroke="currentColor" stroke-width="2"/>
              <path d="M4.5 20c1.8-4 13.2-4 15 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </span>
          Akun Saya
        </div>

        <a class="menu__item active" href="#">Profil</a>
        <a class="menu__item" href="#">Ubah Password</a>

        <!-- BARU: ATUR JADWAL -->
        <a class="menu__item" href="#">
          <span class="icon-inline" aria-hidden="true">
            <!-- calendar -->
            <svg viewBox="0 0 24 24">
              <path d="M7 3v3M17 3v3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M4 7h16v14H4V7Z" fill="none" stroke="currentColor" stroke-width="2"/>
              <path d="M4 11h16" fill="none" stroke="currentColor" stroke-width="2"/>
            </svg>
          </span>
          Jadwal Saya
        </a>

        <a class="menu__item" href="#">
          <span class="icon-inline" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M3 7h18v10H3V7Z" fill="none" stroke="currentColor" stroke-width="2"/>
              <path d="M3 10h18" fill="none" stroke="currentColor" stroke-width="2"/>
            </svg>
          </span>
          Riwayat Pembayaran
        </a>

        <!-- LOGOUT -->
        <button class="menu__item danger logoutBtn" type="button" id="logoutBtn">
          <span class="icon-inline" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M10 17l5-5-5-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M15 12H4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M20 4v16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </span>
          Log Out
        </button>
      </div>

      <div class="sidebar__decor">
        <img src="assets/logo-icon.png" alt="decor">
      </div>
    </aside>

    <!-- CONTENT -->
    <section class="panel">
      <div class="panelCard">
        <div class="panelCard__head">
          <h1 class="panelCard__title">Profil Saya</h1>
          <p class="panelCard__sub">
            Kelola informasi profil Anda untuk mengontrol dan mengamankan akun
          </p>
        </div>

        <div class="panelCard__body">
          <div class="photoBox">
            <div class="photoBox__avatar">
              <img src="assets/image1.png" alt="Foto profil">
            </div>
            <a class="photoBox__link" href="#">
              <span class="icon-inline" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path d="M12 20h9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <path d="M16.5 3.5l4 4L8 20H4v-4L16.5 3.5Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                </svg>
              </span>
              Ubah Foto Profil
            </a>
          </div>

          <form class="profileForm" action="#" method="post">
            <div class="row">
              <label for="username">Username</label>
              <input id="username" type="text" value="Berlian Ika" />
            </div>

            <div class="row">
              <label for="nama">Nama</label>
              <input id="nama" type="text" value="Berlian Ika Isabela" />
            </div>

            <div class="row">
              <label for="email">Email</label>
              <input id="email" type="email" value="beerlnkaaisbella@gmail.com" />
            </div>

            <div class="row">
              <label for="telp">No. Telepon</label>
              <input id="telp" type="tel" value="0812345678919" />
            </div>
          </form>
        </div>
      </div>
    </section>
  </main>

  <!-- LOGOUT POPUP -->
  <div class="modal" id="logoutModal" aria-hidden="true">
    <div class="modal__overlay" id="logoutOverlay"></div>

    <div class="modal__box" role="dialog" aria-modal="true" aria-labelledby="logoutTitle">
      <h2 class="modal__title" id="logoutTitle">Apakah anda yakin ingin<br>mengeluarkan akun?</h2>

      <div class="modal__actions">
        <!-- YES -->
        <button class="modal__btn modal__btn--yes" type="button" id="logoutYes" aria-label="Yes logout">
          <span class="modal__circle modal__circle--yes">✓</span>
        </button>

        <!-- NO -->
        <button class="modal__btn modal__btn--no" type="button" id="logoutNo" aria-label="Cancel logout">
          <span class="modal__circle modal__circle--no">✕</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    const logoutBtn = document.getElementById("logoutBtn");
    const modal = document.getElementById("logoutModal");
    const overlay = document.getElementById("logoutOverlay");
    const noBtn = document.getElementById("logoutNo");
    const yesBtn = document.getElementById("logoutYes");

    function openModal(){
      modal.classList.add("is-open");
      modal.setAttribute("aria-hidden", "false");
      document.body.classList.add("no-scroll");
    }

    function closeModal(){
      modal.classList.remove("is-open");
      modal.setAttribute("aria-hidden", "true");
      document.body.classList.remove("no-scroll");
    }

    logoutBtn.addEventListener("click", openModal);
    overlay.addEventListener("click", closeModal);
    noBtn.addEventListener("click", closeModal);

    // aksi logout
    yesBtn.addEventListener("click", () => {
      // contoh: kembali ke login
      window.location.href = "login.html";
    });

    // ESC untuk tutup
    document.addEventListener("keydown", (e) => {
      if(e.key === "Escape" && modal.classList.contains("is-open")){
        closeModal();
      }
    });
  </script>
</body>
</html>
