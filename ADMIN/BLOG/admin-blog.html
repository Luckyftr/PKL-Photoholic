<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Commissioner:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <title>Kelola Blog - Photoholic</title>
  <link rel="stylesheet" href="admin-blog.css" />
</head>
<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <img class="brand__logo" src="assets/logo-photoholic.png" alt="Photoholic">

    <nav class="topnav" aria-label="Main navigation">
      <a class="topnav__link" href="beranda-admin.html">Beranda</a>
      <a class="topnav__link" href="admin_pemesanan.html">Pemesanan</a>
      <a class="topnav__link" href="admin_studio.html">Studio</a>
      <a class="topnav__link is-active" href="admin_blog.html">Kelola Blog</a>
    </nav>

    <button class="topbar__user" type="button" aria-label="User menu">
      <span class="topbar__userCircle">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 12a4.5 4.5 0 1 0-4.5-4.5A4.5 4.5 0 0 0 12 12Z" fill="none" stroke="currentColor" stroke-width="2"/>
          <path d="M4 21c1.8-4 14.2-4 16 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </span>
    </button>
  </header>

  <!-- PAGE -->
  <main class="page">
    <div class="layout">

      <!-- LIST KONTEN -->
      <section class="panel panel--list">
        <div class="panelHead">
          <div>
            <h1 class="panelTitle">Kelola Blog</h1>
            <p class="panelSub">Kelola promo, event, dan konten Instagram Photoholic.</p>
          </div>
        </div>

        <div class="filters">
          <div class="search">
            <span class="search__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z" fill="none" stroke="currentColor" stroke-width="2"/>
                <path d="M16.5 16.5 21 21" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </span>
            <input id="q" type="text" placeholder="Cari konten..." />
          </div>

          <div class="selectWrap">
            <select id="filterKategori">
              <option value="all">Semua Kategori</option>
              <option value="Promo">Promo</option>
              <option value="Event">Event</option>
              <option value="Pengumuman">Pengumuman</option>
              <option value="Update Studio">Update Studio</option>
            </select>
          </div>

          <div class="selectWrap">
            <select id="filterStatus">
              <option value="all">Semua Status</option>
              <option value="Publish">Publish</option>
              <option value="Draft">Draft</option>
            </select>
          </div>
        </div>

        <div class="list" id="blogList"></div>
      </section>

      <!-- FORM -->
      <section class="panel panel--form" id="formPanel">
        <div class="formHead">
          <button class="backBtn" id="backBtn" type="button" aria-label="Kembali">
            <svg viewBox="0 0 24 24">
              <path d="M15 18l-6-6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <h2 class="formTitle" id="formTitle">Tambah Konten</h2>
        </div>

        <div class="photoArea">
          <div class="photoBox">
            <img id="photoPreview" src="" alt="Preview cover" />
            <div class="photoEmpty" id="photoEmpty">
              <div class="photoEmpty__icon">
                <svg viewBox="0 0 24 24">
                  <path d="M4 7h16v12H4V7Z" fill="none" stroke="currentColor" stroke-width="2"/>
                  <path d="M8 7l2-3h4l2 3" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                  <path d="M9 13a3 3 0 1 0 6 0 3 3 0 0 0-6 0Z" fill="none" stroke="currentColor" stroke-width="2"/>
                </svg>
              </div>
              <div class="photoEmpty__text">Belum ada cover</div>
            </div>
          </div>

          <input id="photoInput" type="file" accept="image/*" hidden>
          <button class="photoBtn" id="photoBtn" type="button">Tambahkan Cover</button>
        </div>

        <form class="blogForm" id="blogForm" autocomplete="off">
          <div class="field">
            <label for="judul">Judul Konten</label>
            <input id="judul" type="text" placeholder="Contoh: Promo Bestie Day" required>
          </div>

          <div class="field">
            <label for="kategori">Kategori</label>
            <select id="kategori" required>
              <option value="">Pilih kategori</option>
              <option value="Promo">Promo</option>
              <option value="Event">Event</option>
              <option value="Pengumuman">Pengumuman</option>
              <option value="Update Studio">Update Studio</option>
            </select>
          </div>

          <div class="field">
            <label for="tanggal">Tanggal Publish</label>
            <input id="tanggal" type="date" required>
          </div>

          <div class="field">
            <label for="caption">Caption Singkat</label>
            <input id="caption" type="text" placeholder="Contoh: Diskon spesial untuk kamu dan bestie kamu!" required>
          </div>

          <div class="field">
            <label for="isi">Isi Konten</label>
            <textarea id="isi" rows="6" placeholder="Tulis isi promo, event, atau pengumuman di sini..." required></textarea>
          </div>

          <div class="doubleField">
            <div class="field">
              <label for="igSync">Sinkron Instagram</label>
              <select id="igSync">
                <option value="Ya">Ya</option>
                <option value="Tidak">Tidak</option>
              </select>
            </div>

            <div class="field">
              <label for="status">Status</label>
              <select id="status">
                <option value="Draft">Draft</option>
                <option value="Publish">Publish</option>
              </select>
            </div>
          </div>

          <div class="actions">
            <button class="btn btn--primary" id="submitBtn" type="submit">Simpan Konten</button>
            <button class="btn btn--ghost" id="cancelBtn" type="button">Batalkan</button>
          </div>
        </form>
      </section>

    </div>
  </main>

  <!-- FAB -->
  <button class="fab" id="addBtn" type="button" aria-label="Tambah konten">+</button>

  <!-- MODAL -->
  <div class="modal" id="modal" aria-hidden="true">
    <div class="modal__overlay" data-close="true"></div>
    <div class="modal__card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <h3 class="modal__title" id="modalTitle">Judul</h3>
      <p class="modal__text" id="modalText">Isi modal</p>
      <div class="modal__actions" id="modalActions"></div>
    </div>
  </div>

  <script src="admin-blog.js"></script>
</body>
</html>
