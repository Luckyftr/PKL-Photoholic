<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Commissioner:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <title>Masuk - Photoholic</title>
  <link rel="stylesheet" href="masuk.css" />
</head>
<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="brand">
      <img class="brand__logo" src="assets/logo-photoholic.png" alt="Photoholic" />
    </div>
    <a class="help" href="#">Butuh Bantuan?</a>
  </header>

  <!-- CONTENT -->
  <main class="content">

    <!-- LEFT -->
    <section class="left">
      <div class="logoGroup">
        <img class="left__illus" src="assets/logo-icon.png" alt="Illustration" />
        <img class="left__bigLogo" src="assets/test-photoholic.png" alt="Photoholic" />
      </div>
    </section>

    <!-- RIGHT -->
    <section class="right">
      <div class="card">
        <h2 class="card__title">Masuk ke akun kamu</h2>
        <p class="card__desc">Silakan masuk untuk melanjutkan booking dan melihat riwayat reservasi kamu.</p>

        <form class="form" action="#" method="post" id="loginForm">

          <div class="field">
            <label for="user">Email / Nomor HP</label>
            <input id="user" type="text" placeholder="Masukkan email atau nomor HP" required />
          </div>

          <div class="field">
            <label for="pass">Password</label>
            <div class="inputIcon">
              <input id="pass" type="password" placeholder="Masukkan password" required />

              <button class="eyeBtn" type="button" aria-label="Tampilkan password"
                data-target="pass" data-state="hidden">

                <!-- eye open -->
                <svg class="icon-eye icon-eye-open" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                  <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"
                        fill="none" stroke="currentColor" stroke-width="2"/>
                </svg>

                <!-- eye off -->
                <svg class="icon-eye icon-eye-off" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M3 3l18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <path d="M10.6 10.6a2.5 2.5 0 0 0 3.4 3.4" fill="none" stroke="currentColor" stroke-width="2"/>
                  <path d="M6.5 6.5C4 8.5 2 12 2 12s3.5 7 10 7c2 0 3.8-.5 5.3-1.4"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                  <path d="M9.5 4.3A10.8 10.8 0 0 1 12 5c6.5 0 10 7 10 7a18 18 0 0 1-3.2 4.5"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                </svg>

              </button>
            </div>

            <div class="rowRight">
              <a class="forgot" href="forgot-password.html">Lupa kata sandi?</a>
            </div>
          </div>

          <button class="btn" type="submit">Masuk</button>

          <div class="divider"><span>atau lanjutkan dengan</span></div>

          <!-- tombol google -->
          <button id="googleBtn" class="googleLogin" type="button" aria-label="Masuk dengan Google">
            <img src="assets/icon-google.png" alt="Google" />
            <span>Masuk dengan Google</span>
          </button>

          <p class="bottomText">
            Belum punya akun? <a href="register.html">Daftar sekarang</a>
          </p>

        </form>
      </div>
    </section>

  </main>

  <!-- ================= MODAL GOOGLE ================= -->
  <div id="googleModal" class="modal" aria-hidden="true">
    <div class="modal__backdrop" data-close="true"></div>

    <div class="modal__panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <h3 id="modalTitle" class="modal__title">Pilih akun</h3>
      <p class="modal__subtitle">untuk melanjutkan ke Photoholic</p>

      <div class="modal__list">

        <button class="modal__row" type="button">
          <div class="modal__avatar">
             <img src="assets/profile-berlian.jpeg" alt="Foto profil Berlian Ika">
          </div>
          <div class="modal__info">
            <div class="modal__name">Berlian Ika</div>
            <div class="modal__email">beerlnkaaisbella@gmail.com</div>
          </div>
        </button>

        <div class="modal__divider"></div>

        <button class="modal__row" type="button">
          <div class="modal__avatar modal__avatar--soft">
             <img src="assets/profile-kampus.jpeg" alt="Foto profil akun kampus">
          </div>
          <div class="modal__info">
            <div class="modal__name">23081010056 Berlian Ika Isabela</div>
            <div class="modal__email">23081010056@student.upnjatim.ac.id</div>
          </div>
        </button>

        <div class="modal__divider"></div>

        <button class="modal__row" type="button">
          <div class="modal__iconUser">+</div>
          <div class="modal__info">
            <div class="modal__name">Gunakan akun lain</div>
            <div class="modal__email">Masuk dengan akun Google lainnya</div>
          </div>
        </button>

      </div>

      <div class="modal__actions">
        <button id="modalCancel" class="modal__btn modal__btn--ghost" type="button">Batal</button>
        <button class="modal__btn modal__btn--primary" type="button">Lanjutkan</button>
      </div>
    </div>
  </div>

  <script src="masuk.js"></script>
</body>
</html>
